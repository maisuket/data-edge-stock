services:
  backend:
    build: ./backend
    container_name: stock-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/prisma/dev.db:/app/prisma/dev.db
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_URL=file:./dev.db
      # JWT_SECRET e ALLOWED_ORIGINS devem vir do arquivo .env (não commitar!)
    restart: always

  frontend:
    build: ./frontend
    container_name: stock-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
